<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ProJax Management</title>
</head>
<body>
    <nav>
        <button onclick="showPage('form')">กรอกข้อมูล</button>
        <button onclick="showPage('search')">ค้นหา</button>
    </nav>

    <div id="form" class="page active">
        <h2>กรอกข้อมูลลูกค้า</h2>
        <input type="text" id="name" placeholder="ชื่อ-สกุล">
        <input type="text" id="imageLink" placeholder="ลิงก์รูปภาพ">
        <select id="status">
            <option value="ผ่าน">ผ่าน</option>
            <option value="ไม่ผ่าน">ไม่ผ่าน</option>
        </select>
        <button id="submitBtn" onclick="sendDataToSheet()">บันทึกข้อมูล</button>
    </div>

    <div id="search" class="page">
        <h2>ค้นหาข้อมูล</h2>
        <input type="text" id="searchBox" placeholder="ค้นหาด้วยชื่อ...">
        <div id="resultContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
