<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProJax Management</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .page { display: none; }
        .active { display: block; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showPage('form')">บันทึกข้อมูล</button>
        <button onclick="showPage('search')">ค้นหา</button>
    </nav>

    <!-- หน้ากรอกข้อมูล -->
    <div id="form" class="page active">
        <h2>กรอกข้อมูลลูกค้า</h2>
        <input type="text" id="name" placeholder="ชื่อ-สกุล">
        <select id="status">
            <option value="มี">มี</option>
            <option value="ไม่มี">ไม่มี</option>
            <option value="อื่นๆ">อื่นๆ</option>
        </select>
        <button id="submitBtn" onclick="uploadData()">บันทึกข้อมูล</button>
    </div>

    <!-- หน้าค้นหา -->
    <div id="search" class="page">
        <h2>ค้นหาข้อมูล</h2>
        <input type="text" id="searchBox" placeholder="ค้นหาด้วยชื่อ...">
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
