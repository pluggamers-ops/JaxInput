<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProJax Management</title>
    <style>
        /* จัดขนาดให้เหมาะกับมือถือ */
        body { 
            font-family: sans-serif; 
            background-color: #f4f7f6; 
            padding: 20px; 
            margin: 0;
            font-size: 18px; /* เพิ่มขนาดตัวอักษรพื้นฐาน */
        }
        h2 { color: #2c3e50; text-align: center; font-size: 24px; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        nav button { 
            flex: 1; 
            padding: 15px; /* ปุ่มใหญ่ขึ้น กดง่าย */
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px;
            cursor: pointer; 
        }
        .page { display: none; }
        .active { display: block; }
        input, select, button#submitBtn { 
            width: 100%; 
            padding: 20px; /* ช่องกรอกใหญ่ขึ้น */
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 18px; /* อักษรในช่องกรอกใหญ่ขึ้น */
        }
        button#submitBtn { background-color: #27ae60; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showPage('form')">บันทึก</button>
        <button onclick="showPage('search')">ค้นหา</button>
    </nav>

    <div id="form" class="page active">
        <h2>กรอกข้อมูลลูกค้า</h2>
        <input type="text" id="name" placeholder="ชื่อ-สกุล">
        <select id="status">
            <option value="มี">มี</option>
            <option value="ไม่มี">ไม่มี</option>
            <option value="อื่นๆ">อื่นๆ</option>
        </select>
        <button id="submitBtn" onclick="uploadData()">บันทึกข้อมูล</button>
    </div>

    <div id="search" class="page">
        <h2>ค้นหาข้อมูล</h2>
        <input type="text" id="searchBox" placeholder="ค้นหาด้วยชื่อ...">
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
